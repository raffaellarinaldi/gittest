name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Nuovo step: scarica CSV
      # ----------------------------
      - name: Download properties.csv
        run: |
          mkdir -p _data
          curl -L --fail "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEVX2ECS6vJFdMv1q5zZFKJ18ge1CAnlkcx2-Yobp6A0wSmFMeBltOYNDtQO3VHDqdMYmlf-nbATb_/pub?gid=0&single=true&output=csv" \
          -o _data/properties.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4